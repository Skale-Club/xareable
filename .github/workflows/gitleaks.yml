name: gitleaks

# Catches any secret that bypasses the local pre-commit hook
# (e.g. force pushes, contributors without husky installed, --no-verify).
#
# Uses the gitleaks CLI binary directly (free, no license required) instead of
# gitleaks-action@v2 which requires a paid license for GitHub org repos.
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  scan:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout (full history for accurate scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks
        run: gitleaks detect --config .gitleaks.toml --no-banner --redact
